upstream django {
    server backend:8000;
}

upstream react {
    server frontend:5173;
}

upstream orthanc_upstream {
    server orthanc:8042;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 500M;
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    # ───────────────────────────────────────────────
    # React frontend (dev with HMR support)
    # ───────────────────────────────────────────────
    location / {
        proxy_pass         http://react;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ───────────────────────────────────────────────
    # Django API
    # ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ───────────────────────────────────────────────
    # Django Admin
    # ───────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ───────────────────────────────────────────────
    # Django static files
    # ───────────────────────────────────────────────
    location /static/ {
        proxy_pass http://django;
    }

    # ───────────────────────────────────────────────
    # Orthanc — REST API + DICOMweb + WADO
    #
    # The trailing slash on BOTH location and proxy_pass
    # makes Nginx automatically strip /orthanc/ and
    # forward the remainder. No rewrite needed.
    # ───────────────────────────────────────────────
    location /orthanc/ {
        proxy_pass http://orthanc_upstream/;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_pass_header  Authorization;

        client_max_body_size 500M;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }
    }
}