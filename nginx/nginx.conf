upstream django {
    server backend:8000;
}

upstream react {
    server frontend:5173;
}

upstream orthanc_upstream {
    server orthanc:8042;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 500M;
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    # ───────────────────────────────────────────────
    # React frontend (dev with HMR support)
    # ───────────────────────────────────────────────
    location / {
        proxy_pass         http://react;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ───────────────────────────────────────────────
    # Django API
    # ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ───────────────────────────────────────────────
    # Django Admin
    # ───────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ───────────────────────────────────────────────
    # Django static files
    # ───────────────────────────────────────────────
    location /static/ {
        proxy_pass http://django;
    }

    # ───────────────────────────────────────────────
    # Orthanc  — REST API + DICOMweb + WADO
    #
    # FIX: The old config had BOTH a trailing slash on
    # proxy_pass (which strips /orthanc/) AND a rewrite
    # rule doing the same thing → double-strip → 500.
    #
    # Now we use ONLY rewrite for clarity.
    # ───────────────────────────────────────────────
    location /orthanc/ {
        # No trailing slash — forward the path as-is first
        proxy_pass http://orthanc_upstream;

        # Then strip the /orthanc prefix
        rewrite ^/orthanc/(.*) /$1 break;

        # Forward all headers the client sends
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Critical: pass through Authorization header
        proxy_set_header   Authorization     $http_authorization;
        proxy_pass_header  Authorization;

        # Allow large DICOM uploads
        client_max_body_size 500M;

        # CORS headers for DICOMweb requests from the browser
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }
    }
}